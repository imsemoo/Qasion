<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&amp;family=Roboto:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<style>
body{margin:0}
a{text-decoration:none}
</style>
</helmet>
<div dir="rtl" style="font-family:'IBM Plex Sans Arabic','Roboto',sans-serif">
  <!-- logo row -->
  <div style="background:#fff;display:flex;align-items:center;justify-content:center;padding:18px 48px;border-bottom:1px solid #EEF1F6;position:relative">
    <a href="Home.dc.html" style="display:block"><img src="assets/logo-horizontal.png" alt="مركز قاسيون للدراسات الاستراتيجية" style="height:64px;display:block"></a>
    <span style="position:absolute;right:48px;top:50%;transform:translateY(-50%);color:#4A5474;font-size:12.5px;display:flex;align-items:center;gap:9px">
      <span style="width:6px;height:6px;background:#EB6224;transform:rotate(45deg);display:inline-block"></span>
      الخميس 9 تموز/يوليو 2026
    </span>
    <a href="Home.dc.html#newsletter" style="position:absolute;left:48px;top:50%;transform:translateY(-50%);background:#24326B;color:#fff;font-size:13px;font-weight:600;padding:9px 20px;border-radius:8px;transition:background .2s" style-hover="background:#EB6224;color:#fff">اشترك بالنشرة</a>
  </div>
  <!-- nav bar -->
  <div style="background:#24326B;padding:0 48px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(20,31,73,.18)">
    <nav style="display:flex;align-items:center;gap:clamp(12px,2vw,26px);flex:none">
      <a href="Home.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">الرئيسية<sc-if value="{{ isHome }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
      <a href="About.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">عن المركز<sc-if value="{{ isAbout }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
      <a href="Research.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">الإنتاج البحثي<sc-if value="{{ isResearch }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
      <a href="Files.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">الملفات<sc-if value="{{ isFiles }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
      <a href="Library.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">المكتبة<sc-if value="{{ isLibrary }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
      <a href="Media.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">الميديا<sc-if value="{{ isMedia }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
      <a href="Contact.dc.html" style="color:rgba(255,255,255,.95);font-size:14.5px;font-weight:600;padding:16px 2px;position:relative;white-space:nowrap;flex:none" style-hover="color:#fff">تواصل معنا<sc-if value="{{ isContact }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:0;left:0;bottom:0;height:3px;background:#EB6224"></span></sc-if></a>
    </nav>
    <div style="display:flex;align-items:center;gap:14px;min-width:0;flex:1;justify-content:flex-end">
      <div style="display:flex;align-items:center;background:#fff;border-radius:100px;padding:4px 6px 4px 4px;gap:9px;box-shadow:0 2px 8px rgba(16,24,60,.22);transition:box-shadow .2s;min-width:0;flex:0 1 210px" style-hover="box-shadow:0 4px 14px rgba(16,24,60,.32)">
        <input placeholder="ادخل كلمة البحث…" style="background:transparent;border:none;outline:none;color:#24326B;font-size:13px;font-family:'IBM Plex Sans Arabic',sans-serif;width:100%;min-width:70px;padding:5px 10px 5px 2px">
        <span style="width:30px;height:30px;border-radius:50%;background:#EB6224;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:background .2s" style-hover="background:#FF7635">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#fff" stroke-width="1.8"></circle><line x1="11" y1="11" x2="15" y2="15" stroke="#fff" stroke-width="1.8" stroke-linecap="round"></line></svg>
        </span>
      </div>
      <span style="color:rgba(255,255,255,.25)">|</span>
      <div style="display:flex;gap:8px;flex:none">
        <a href="Contact.dc.html" title="تيلجرام" style="width:29px;height:29px;border-radius:50%;border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:11.5px;font-family:'Roboto',sans-serif;font-weight:700" style-hover="border:1px solid #EB6224;color:#EB6224">t</a>
        <a href="Contact.dc.html" title="إكس" style="width:29px;height:29px;border-radius:50%;border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:11.5px;font-family:'Roboto',sans-serif;font-weight:700" style-hover="border:1px solid #EB6224;color:#EB6224">X</a>
        <a href="Contact.dc.html" title="فيسبوك" style="width:29px;height:29px;border-radius:50%;border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:11.5px;font-family:'Roboto',sans-serif;font-weight:700" style-hover="border:1px solid #EB6224;color:#EB6224">f</a>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 158}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;about&quot;, &quot;research&quot;, &quot;files&quot;, &quot;library&quot;, &quot;media&quot;, &quot;contact&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || '';
    return {
      isHome: a === 'home',
      isAbout: a === 'about',
      isResearch: a === 'research',
      isFiles: a === 'files',
      isLibrary: a === 'library',
      isMedia: a === 'media',
      isContact: a === 'contact'
    };
  }
}
</script>
</body>
</html>
